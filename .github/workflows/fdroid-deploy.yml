name: F-Droid Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies and sync Capacitor
        run: |
          npm install
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Create debug keystore for signing
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias androiddebugkey \
            -storepass android -keypass android \
            -dname "C=US,O=Android,CN=Android Debug"

      - name: Sign APK with apksigner (v2 scheme)
        run: |
          APK_UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_SIGNED="android/app/build/outputs/apk/release/app-release.apk"

          # Use apksigner for v2 signatures (required for Android 11+)
          $ANDROID_HOME/build-tools/*/apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            --key-pass pass:android \
            --out $APK_SIGNED \
            $APK_UNSIGNED

          echo "✅ APK signed successfully: $APK_SIGNED"

      - name: Create GitHub Release with signed APK
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify F-Droid
        run: |
          echo "Release created. To publish to F-Droid:"
          echo "1. Add repository metadata to fdroid/"
          echo "2. Submit to F-Droid repository"
          echo "3. F-Droid will build and sign the APK"
