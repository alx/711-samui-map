<script>
(function () {

 
function getGeoJSON() {
  if (window.MAP_CONFIG?.geojsonData) return window.MAP_CONFIG.geojsonData;
  if (window.allPOIs) return { type: 'FeatureCollection', features: window.allPOIs };
  return null;
}

function getTitle() { return window.MAP_CONFIG?.title || document.title; }

function triggerDownload(content, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}

function closeAllModals() {
  document.querySelectorAll('.tb-modal-overlay').forEach(m => m.remove());
}

 
window.tbDownloadGeoJSON = function () {
  const data = getGeoJSON();
  if (!data) {
    alert('Map data not loaded yet.');
    return;
  }
  const filename = (getTitle().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') || 'map') + '.geojson';
  triggerDownload(JSON.stringify(data, null, 2), filename, 'application/geo+json');
};

 
window.tbExportGPX = function () {
  const data = getGeoJSON();
  if (!data) { alert('Map data not loaded yet.'); return; }

  const wpts = (data.features || []).filter(f => f.geometry?.type === 'Point');
  const lines = (data.features || []).filter(f => f.geometry?.type === 'LineString');

  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const title = esc(getTitle());

  let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n`;
  gpx += `<gpx version="1.1" creator="maps.girard-davila.net" xmlns="http://www.topografix.com/GPX/1/1">\n`;
  gpx += `  <metadata><name>${title}</name><desc>Exported from maps.girard-davila.net</desc></metadata>\n`;

  
  wpts.forEach(f => {
    const [lng, lat] = f.geometry.coordinates;
    const p = f.properties || {};
    gpx += `  <wpt lat="${lat}" lon="${lng}">\n`;
    gpx += `    <name>${esc(p.name)}</name>\n`;
    if (p.notes || p.address) gpx += `    <desc>${esc(p.notes || p.address)}</desc>\n`;
    if (p.category) gpx += `    <type>${esc(p.category)}</type>\n`;
    gpx += `  </wpt>\n`;
  });

  
  lines.forEach(f => {
    const p = f.properties || {};
    gpx += `  <trk><name>${esc(p.name || 'Route')}</name><trkseg>\n`;
    f.geometry.coordinates.forEach(([lng, lat]) => {
      gpx += `    <trkpt lat="${lat}" lon="${lng}"></trkpt>\n`;
    });
    gpx += `  </trkseg></trk>\n`;
  });

  gpx += `</gpx>`;

  const filename = (getTitle().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') || 'map') + '.gpx';
  triggerDownload(gpx, filename, 'application/gpx+xml');
};

 
window.tbOpenEmbed = function () {
  closeAllModals();
  const path = window.MAP_CONFIG?.embedPath || window.location.pathname;
  const iframeURL = location.origin + path + '?embed=1';
  const code = `<iframe src="${iframeURL}" width="100%" height="500" frameborder="0" style="border-radius:12px;" title="${getTitle()}"></iframe>`;

  const overlay = document.createElement('div');
  overlay.className = 'tb-modal-overlay';
  overlay.innerHTML = `
    <div class="tb-modal">
      <h3>Embed this map <button class="tb-modal-close" onclick="this.closest('.tb-modal-overlay').remove()">✕</button></h3>
      <label class="tb-label">iframe code — paste into any webpage:</label>
      <textarea class="tb-code" rows="4" readonly id="tb-embed-code">${code}</textarea>
      <div style="margin-top:0.75rem;display:flex;gap:0.5rem;flex-wrap:wrap;">
        <button class="tb-btn-primary" onclick="
          navigator.clipboard.writeText(document.getElementById('tb-embed-code').value);
          this.textContent='✅ Copied!';setTimeout(()=>this.textContent='📋 Copy code',1800);">
          📋 Copy code
        </button>
        <button class="tb-btn-secondary" onclick="this.closest('.tb-modal-overlay').remove()">Close</button>
      </div>
      <hr class="tb-divider">
      <label class="tb-label" style="margin-bottom:0.25rem;">Preview (live):</label>
      <iframe src="${iframeURL}" width="100%" height="220" frameborder="0" style="border-radius:8px;border:1px solid #e5e7eb;" loading="lazy"></iframe>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
};

 
window.tbShareURL = function () {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.getElementById('tb-share-btn');
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '🔗 Share', 1800);
  });
};

 
window.tbOpenLoad = function () {
  closeAllModals();
  const pat = localStorage.getItem('github_pat') || '';
  const overlay = document.createElement('div');
  overlay.className = 'tb-modal-overlay';
  overlay.innerHTML = `
    <div class="tb-modal" style="max-width:500px;">
      <h3>Load custom map data <button class="tb-modal-close" onclick="this.closest('.tb-modal-overlay').remove()">✕</button></h3>

      <div class="tb-tabs">
        <button class="tb-tab active" onclick="tbLoadTab('file',this)">📁 File</button>
        <button class="tb-tab" onclick="tbLoadTab('url',this)">🔗 URL</button>
        <button class="tb-tab" onclick="tbLoadTab('forks',this);tbLoadForks()">🐙 GitHub Forks</button>
      </div>

      \x3C!-- File tab -->
      <div id="tb-load-file">
        <p style="font-size:0.82rem;color:#555;margin-bottom:0.75rem;">Upload a <strong>GeoJSON</strong> or <strong>TopoJSON</strong> file from your device.</p>
        <input type="file" accept=".geojson,.json,.topojson" style="font-size:0.82rem;" onchange="tbLoadFile(this)">
      </div>

      \x3C!-- URL tab -->
      <div id="tb-load-url" style="display:none;">
        <p style="font-size:0.82rem;color:#555;margin-bottom:0.75rem;">Load from any public URL — GitHub raw, S3, Gist, etc.</p>
        <div style="display:flex;gap:0.4rem;margin-bottom:0.5rem;">
          <input class="tb-input" id="tb-url-input" type="url" placeholder="https://raw.githubusercontent.com/…/file.geojson" style="flex:1;">
          <button class="tb-btn-primary" onclick="tbLoadURL()">Load</button>
        </div>
        <p id="tb-load-status" class="tb-status"></p>
      </div>

      \x3C!-- GitHub Forks tab -->
      <div id="tb-load-forks" style="display:none;">
        <p style="font-size:0.82rem;color:#555;margin-bottom:0.75rem;">
          Browse public forks of <strong>alx/travel-guide</strong> and load their GeoJSON/TopoJSON files.
          ${pat ? '' : '<br><span style="color:#888;">Sign in via 🐙 GitHub for higher rate limits.</span>'}
        </p>
        <div id="tb-forks-list" style="max-height:360px;overflow-y:auto;">
          <p style="color:#888;font-size:0.82rem;text-align:center;padding:1rem;">⏳ Loading forks…</p>
        </div>
        <p id="tb-forks-status" class="tb-status"></p>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
};

window.tbLoadTab = function(tab, btn) {
  ['file','url','forks'].forEach(t => {
    document.getElementById('tb-load-' + t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.tb-modal .tb-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
};

 
window.tbLoadForks = async function() {
  const list = document.getElementById('tb-forks-list');
  const status = document.getElementById('tb-forks-status');
  if (!list) return;

  const pat = localStorage.getItem('github_pat') || '';
  const headers = pat
    ? { Authorization: 'Bearer ' + pat, 'X-GitHub-Api-Version': '2022-11-28' }
    : { 'X-GitHub-Api-Version': '2022-11-28' };

  try {
    
    const r = await fetch('https://api.github.com/repos/alx/travel-guide/forks?per_page=100&sort=newest', { headers });

window.tbLoadForkBranches = async function(owner, repo, forkId, headers) {
  const select = document.getElementById('branch-' + forkId);
  if (!select) return;
  try {
    const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/branches?per_page=30`, { headers });
    const branches = await r.json();
    if (!Array.isArray(branches)) { select.innerHTML = '<option>No branches</option>'; return; }
    select.innerHTML = '<option value="">— pick a branch —</option>'
      + branches.map(b => `<option value="${b.name}"${b.name === 'main' || b.name === 'master' ? ' selected' : ''}>${b.name}</option>`).join('');
    
    const def = branches.find(b => b.name === 'main' || b.name === 'master') || branches[0];
    if (def) tbForkBranchChange(owner, repo, def.name, 'files-' + forkId);
  } catch {

window.tbForkBranchChange = async function(owner, repo, branch, filesContainerId) {
  const container = document.getElementById(filesContainerId);
  if (!container || !branch) return;
  container.innerHTML = '<span style="font-size:0.75rem;color:#888;">⏳ Scanning for GeoJSON…</span>';

  const pat = localStorage.getItem('github_pat') || '';
  const headers = pat
    ? { Authorization: 'Bearer ' + pat, 'X-GitHub-Api-Version': '2022-11-28' }
    : { 'X-GitHub-Api-Version': '2022-11-28' };

  try {
    
    const refR = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/ref/heads/${encodeURIComponent(branch)}`, { headers });
    const refData = await refR.json();
    const sha = refData.object?.sha;
    if (!sha) { container.innerHTML = '<span style="font-size:0.75rem;color:#888;">Branch not found.</span>'; return; }

    const treeR = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees/${sha}?recursive=1`, { headers });
    const treeData = await treeR.json();

    const geoFiles = (treeData.tree || []).filter(f =>
      f.type === 'blob' && /\.(geo)?json|\.topojson$/i.test(f.path) && f.path.startsWith('static/')
    );

    if (!geoFiles.length) {
      container.innerHTML = '<span style="font-size:0.75rem;color:#888;">No GeoJSON/TopoJSON files in static/.</span>';
      return;
    }

    container.innerHTML = geoFiles.map(f => {
      const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${f.path}`;
      const label = f.path.replace('static/', '').replace('/locations.geojson', '').replace(/\.(geo)?json|\.topojson$/i, '');
      return `<div class="tb-repo-item" style="display:flex;align-items:center;gap:0.5rem;padding:0.4rem 0.6rem;" onclick="tbLoadURL_direct('${rawUrl}','${label}')">
        <span style="font-size:1rem;">📄</span>
        <span style="font-size:0.8rem;font-weight:500;flex:1;">${label}</span>
        <span style="font-size:0.72rem;color:#888;">${f.path.split('/').pop()}</span>
      </div>`;
    }).join('');
  } catch (err) {
    container.innerHTML = '<span style="font-size:0.75rem;color:#c00;">❌ ' + err.message + '</span>';
  }
};

window.tbIngestData = function(data, sourceName) {
  let geojson;
  if (data.type === 'Topology') {
    
    if (typeof topojson === 'undefined') {
      alert('topojson-client not loaded. Cannot convert TopoJSON.');
      return;
    }
    const features = [];
    Object.keys(data.objects).forEach(key => {
      const fc = topojson.feature(data, data.objects[key]);
      features.push(...fc.features);
    });
    geojson = { type: 'FeatureCollection', features };
  } else if (data.type === 'FeatureCollection' || data.type === 'Feature') {
    geojson = data.type === 'Feature' ? { type: 'FeatureCollection', features: [data] } : data;
  } else {
    alert('Unrecognised format. Expected GeoJSON FeatureCollection or TopoJSON Topology.');
    return;
  }

  if (typeof window.loadCustomData === 'function') {
    window.loadCustomData(geojson, sourceName);
  } else {
    alert('This map page does not support live data loading yet.');
  }
};

window.tbGHOAuthStart = async function() {
  const clientId = window.GITHUB_CLIENT_ID;
  if (!clientId) {
    document.getElementById('gh-device-status').textContent = '⚠️ GitHub Client ID not configured. Use PAT method instead.';
    return;
  }
  const status = document.getElementById('gh-device-status');
  const codeBox = document.getElementById('gh-device-code-box');
  status.textContent = '⏳ Requesting device code…';

  try {
    const proxyUrl = window.GITHUB_WORKER_URL + '/github-device-code';
    const res = await fetch(proxyUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ client_id: clientId, scope: 'repo read:user' })
    });
    if (!res.ok) throw new Error('Worker returned ' + res.status);
    const d = await res.json();

    document.getElementById('gh-device-code-display').textContent = d.user_code;
    codeBox.style.display = '';
    status.textContent = '⏳ Waiting for you to authorize at github.com/login/device…';

    
    let attempts = 0;
    const interval = (d.interval || 5) * 1000;
    const poll = setInterval(async () => {
      attempts++;
      if (attempts > 36) { clearInterval(poll); status.textContent = '⏰ Timed out. Try again.'; return; }
      try {
        const tr = await fetch(window.GITHUB_WORKER_URL + '/github-device-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ client_id: clientId, device_code: d.device_code, grant_type: 'urn:ietf:params:oauth:grant-type:device_code' })
        });
        const td = await tr.json();
        if (td.access_token) {
          clearInterval(poll);
          localStorage.setItem('github_pat', td.access_token);
          await tbGHFetchUser(td.access_token);
        } else if (td.error !== 'authorization_pending') {
          clearInterval(poll);
          status.textContent = '❌ ' + (td.error_description || td.error);
        }
      } catch (e) {   }
    }, interval);
  } catch (err) {
    status.textContent = '❌ ' + err.message;
  }
};

window.tbGHCreatePR = async function() {
  const token = localStorage.getItem('github_pat');
  const user  = JSON.parse(localStorage.getItem('github_user') || 'null');
  const data  = getGeoJSON();
  const filename = document.getElementById('gh-pr-filename').value.trim();
  const title    = document.getElementById('gh-pr-title').value.trim() || ('Add ' + filename + ' map');
  const body     = document.getElementById('gh-pr-body').value.trim();
  const status   = document.getElementById('gh-pr-status');
  const btn      = document.getElementById('gh-pr-btn');

  if (!token || !user) { status.textContent = '❌ Sign in first.'; return; }
  if (!filename)        { status.textContent = '❌ Enter a filename.'; return; }
  if (!data)            { status.textContent = '❌ No map data to submit.'; return; }

  btn.disabled = true;
  const upstream = 'alx/travel-guide';
  const [upOwner, upRepo] = upstream.split('/');

  try {
    
    status.textContent = '⏳ Forking repository…';
    const forkRes = await fetch(`https://api.github.com/repos/${upstream}/forks`, {
      method: 'POST', headers: { Authorization: 'Bearer ' + token, 'X-GitHub-Api-Version': '2022-11-28', Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ default_branch_only: true })
    });
    if (!forkRes.ok && forkRes.status !== 422) throw new Error('Fork failed: ' + forkRes.status);

    
    await new Promise(r => setTimeout(r, 2500));

    
    status.textContent = '⏳ Getting branch info…';
    const repoRes = await fetch(`https://api.github.com/repos/${user.login}/${upRepo}`, {
      headers: { Authorization: 'Bearer ' + token, 'X-GitHub-Api-Version': '2022-11-28' }
    });
    const repoData = await repoRes.json();
    const defaultBranch = repoData.default_branch || 'main';

    const branchRes = await fetch(`https://api.github.com/repos/${user.login}/${upRepo}/git/refs/heads/${defaultBranch}`, {
      headers: { Authorization: 'Bearer ' + token, 'X-GitHub-Api-Version': '2022-11-28' }
    });
    const branchData = await branchRes.json();
    const sha = branchData.object?.sha;
    if (!sha) throw new Error('Could not get branch SHA');

    
    const newBranch = 'add-' + filename.replace(/[^a-z0-9]/gi, '-').toLowerCase() + '-' + Date.now();
    status.textContent = '⏳ Creating branch…';
    await fetch(`https://api.github.com/repos/${user.login}/${upRepo}/git/refs`, {
      method: 'POST', headers: { Authorization: 'Bearer ' + token, 'X-GitHub-Api-Version': '2022-11-28', 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref: `refs/heads/${newBranch}`, sha })
    });

    
    status.textContent = '⏳ Committing GeoJSON…';
    const filePath = `static/${filename}/locations.geojson`;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    await fetch(`https://api.github.com/repos/${user.login}/${upRepo}/contents/${filePath}`, {
      method: 'PUT', headers: { Authorization: 'Bearer ' + token, 'X-GitHub-Api-Version': '2022-11-28', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `Add ${filename} GeoJSON map`, content, branch: newBranch })
    });

    
    status.textContent = '⏳ Opening pull request…';
    const prRes = await fetch(`https://api.github.com/repos/${upOwner}/${upRepo}/pulls`, {
      method: 'POST', headers: { Authorization: 'Bearer ' + token, 'X-GitHub-Api-Version': '2022-11-28', 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, body: body + `\n\n---\n_Submitted via maps.girard-davila.net map toolbar_`, head: `${user.login}:${newBranch}`, base: defaultBranch })
    });
    const prData = await prRes.json();
    if (!prRes.ok) throw new Error(prData.message || 'PR failed');

    status.innerHTML = `✅ PR created! <a href="${prData.html_url}" target="_blank" style="color:#1d4ed8;font-weight:600;">View PR #${prData.number} →</a>`;
  } catch (err) {
    status.textContent = '❌ ' + err.message;
    btn.disabled = false;
  }
};

const _crcTable = (() => {
  const t = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
    t[i] = c;
  }
  return t;
})();

function _crc32(bytes) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) c = _crcTable[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}



function injectPNGMetadata(arrayBuffer, meta) {
  const enc = new TextEncoder();
  const textChunks = [];
  for (const [kw, val] of Object.entries(meta)) {
    const data = enc.encode(kw + '\x00' + val);
    const chunk = new Uint8Array(12 + data.length);
    const dv = new DataView(chunk.buffer);
    dv.setUint32(0, data.length);               
    chunk.set([116, 69, 88, 116], 4);           
    chunk.set(data, 8);                         
    dv.setUint32(8 + data.length,               
      _crc32(chunk.slice(4, 8 + data.length)));
    textChunks.push(chunk);
  }
  const extra = textChunks.reduce((s, c) => s + c.length, 0);
  const src = new Uint8Array(arrayBuffer);
  const out = new Uint8Array(src.length + extra);
  out.set(src.slice(0, 33), 0);   
  let pos = 33;
  for (const chunk of textChunks) { out.set(chunk, pos); pos += chunk.length; }
  out.set(src.slice(33), pos);
  return out.buffer;
}



async function captureMapScreenshot() {
  const mapEl      = document.getElementById('map');
  const leafletMap = window._leafletMap;
  if (!mapEl || !leafletMap || typeof L === 'undefined') return null;

  const originalZoom = leafletMap.getZoom();

  
  
  
  
  
  const originals = [];
  leafletMap.eachLayer(l => { if (l instanceof L.TileLayer) originals.push(l); });
  originals.forEach(l => leafletMap.removeLayer(l));

  
  
  const dpr       = Math.min(window.devicePixelRatio || 1, 2);
  const isRetina  = dpr >= 2;
  const workerUrl = window.GITHUB_WORKER_URL || '';
  const useProxy  = workerUrl.length > 8 && !workerUrl.includes('YOUR_SUBDOMAIN');
  const tileUrl   = useProxy
    ? `${workerUrl}/osm-tile/{z}/{x}/{y}`                                     
    : `https://basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}${isRetina ? '@2x' : ''}.png`;

  const corsLayer = L.tileLayer(tileUrl, {
    crossOrigin:   'anonymous',
    attribution:   '',
    tileSize:      isRetina && !useProxy ? 512 : 256,  
    zoomOffset:    isRetina && !useProxy ? -1  : 0,    
  });
  corsLayer.addTo(leafletMap);

  
  await new Promise(resolve => {
    let done = false;
    const finish = () => { if (!done) { done = true; resolve(); } };
    corsLayer.once('load', finish);
    setTimeout(finish, 6000);
  });

  
  leafletMap.setZoom(originalZoom - 1, { animate: false });
  await new Promise(resolve => {
    let done = false;
    const finish = () => { if (!done) { done = true; resolve(); } };
    corsLayer.once('load', finish);
    setTimeout(finish, 4000);
  });
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  
  
  
  
  
  
  const W = mapEl.offsetWidth;
  const H = mapEl.offsetHeight;
  const canvas  = document.createElement('canvas');
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  const ctx     = canvas.getContext('2d');
  ctx.scale(dpr, dpr); 
  const mapRect = mapEl.getBoundingClientRect();

  
  for (const img of mapEl.querySelectorAll('.leaflet-tile-pane img.leaflet-tile')) {
    if (!img.complete || !img.naturalWidth) continue;
    const r = img.getBoundingClientRect();
    try {
      ctx.drawImage(img,
        Math.round(r.left - mapRect.left), Math.round(r.top - mapRect.top),
        Math.round(r.width), Math.round(r.height));
    } catch {   }
  }

  
  const svgEl = mapEl.querySelector('.leaflet-overlay-pane svg');
  if (svgEl) {
    try {
      const svgStr = new XMLSerializer().serializeToString(svgEl);
      const blobUrl = URL.createObjectURL(new Blob([svgStr], { type: 'image/svg+xml' }));
      await new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const r = svgEl.getBoundingClientRect();
          ctx.drawImage(img,
            Math.round(r.left - mapRect.left), Math.round(r.top - mapRect.top),
            Math.round(r.width), Math.round(r.height));
          URL.revokeObjectURL(blobUrl);
          resolve();
        };
        img.onerror = () => { URL.revokeObjectURL(blobUrl); resolve(); };
        img.src = blobUrl;
      });
    } catch (e) { console.warn('SVG overlay:', e); }
  }

  
  
  
  const catColors = window._mapCategoryColors || {};
  const catIcons  = window._mapCategoryIcons  || {};
  const fallbackColors = {
    Beach:'#0ea5e9', Restaurant:'#f97316', Activity:'#22c55e', Hotel:'#8b5cf6',
    Shopping:'#ec4899', Cafe:'#f59e0b', Port:'#f97316', Fishing:'#0ea5e9',
    Anchorage:'#6366f1', Hazard:'#ef4444', Service:'#f59e0b', Other:'#6b7280',
  };
  const fallbackIcons = {
    Beach:'🏖️', Restaurant:'🍽️', Activity:'🎯', Hotel:'🏨', Shopping:'🛍️',
    Cafe:'☕', Port:'⚓', Fishing:'🎣', Anchorage:'🌙', Hazard:'⚠️',
    Service:'⛽', Other:'📍',
  };
  const R = 16; 

  for (const f of (window.allPOIs || [])) {
    if (f.geometry?.type !== 'Point') continue;
    const [lng, lat] = f.geometry.coordinates;
    const pt  = leafletMap.latLngToContainerPoint([lat, lng]);
    if (pt.x < -R || pt.y < -R || pt.x > W + R || pt.y > H + R) continue;

    const cat   = f.properties?.category || 'Other';
    const color = catColors[cat] || fallbackColors[cat] || '#6b7280';
    const emoji = catIcons[cat]  || fallbackIcons[cat]  || '📍';

    
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, R, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    
    ctx.strokeStyle = '#fff';
    ctx.lineWidth   = 2;
    ctx.stroke();
    
    ctx.font         = '15px serif';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = '#fff';
    ctx.fillText(emoji, pt.x, pt.y);
  }

  
  leafletMap.setZoom(originalZoom, { animate: false });
  leafletMap.removeLayer(corsLayer);
  originals.forEach(l => leafletMap.addLayer(l));

  console.log('Map preview: canvas composite succeeded (' + (useProxy ? 'OSM proxy' : 'CARTO') + ')');
  return canvas.toDataURL('image/png');
}

window.tbExportPNG = async function () {
  const btn = document.getElementById('tb-png-btn');
  if (btn) { btn.textContent = '⏳ Rendering…'; btn.disabled = true; }

  if (typeof htmlToImage === 'undefined') {
    alert('html-to-image library not loaded. Check your internet connection.');
    if (btn) { btn.textContent = '📸 PNG'; btn.disabled = false; }
    return;
  }

  
  const overlay = document.createElement('div');
  overlay.style.cssText = [
    'position:fixed', 'inset:0', 'z-index:99999',
    'background:rgba(10,20,35,0.93)',
    'display:flex', 'flex-direction:column', 'align-items:center', 'justify-content:center',
    'gap:0.6rem', 'color:white', 'font-family:inherit',
  ].join(';');
  const setOverlayMsg = (icon, msg, sub) => {
    overlay.innerHTML = `
      <div style="font-size:2rem;">${icon}</div>
      <div style="font-size:1rem;font-weight:600;">${msg}</div>
      <div style="font-size:0.78rem;opacity:0.45;">${sub}</div>`;
  };
  setOverlayMsg('🗺️', 'Capturing map…', 'rendering tiles & markers');
  document.body.appendChild(overlay);

  
  let mapDataUrl = null;
  try {
    mapDataUrl = await captureMapScreenshot();
  } catch (e) {
    console.warn('Map capture failed, continuing without map:', e);
  }

  
  setOverlayMsg('📸', 'Generating 9:16 share card…', '1080 × 1920 px');

  const card = buildShareCard(mapDataUrl);
  document.body.appendChild(card);

  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
  await new Promise(r => setTimeout(r, 150));

  try {
    const dataUrl = await htmlToImage.toPng(card, {
      width: 540, height: 960, pixelRatio: 2,
      backgroundColor: '#0b1f35',
      skipFonts: true,          
      style: { opacity: '1' },
    });

    const res    = await fetch(dataUrl);
    const buffer = await res.arrayBuffer();

    const cfg   = window.MAP_CONFIG || {};
    const title = (cfg.title || document.title).replace(/\s*[—–-]\s*Girard.Davila Travels$/i,'').trim();
    const withMeta = injectPNGMetadata(buffer, {
      'Title':         title,
      'Source':        location.href,
      'Author':        'Maps',
      'URL':           location.href,
      'Software':      'maps.girard-davila.net',
      'Creation Time': new Date().toISOString(),
      'Comment':       `${(window.allPOIs||[]).filter(f=>!f.properties?.premium).length} curated spots · 9:16 · CARTO map`,
    });

    const filename = title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') + '-share.png';
    const blob = new Blob([withMeta], { type: 'image/png' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);

    if (btn) { btn.textContent = '✅ Done!'; setTimeout(() => { btn.textContent = '📸 PNG'; btn.disabled = false; }, 1800); }
  } catch (err) {
    console.error('PNG export error:', err);
    alert('PNG export failed: ' + err.message);
    if (btn) { btn.textContent = '📸 PNG'; btn.disabled = false; }
  } finally {
    document.body.removeChild(card);
    document.body.removeChild(overlay);
  }
};

})();

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
window.MAP_CONFIG = {
  title: '7-Eleven Koh Samui — Maps',
  geojsonUrl: '\/711-samui\/locations.geojson',
  embedPath: '/711-samui/',
  previewImage: '/images/map-previews/711-samui.png'
};

const GEOJSON_URL = window.MAP_CONFIG.geojsonUrl;
const STORE_COLOR = '#00a651'; 

let map, allPOIs = [], markers = {}, activeFilter = 'All', activeCard = null;
Object.defineProperty(window, 'allPOIs', { get: () => allPOIs, configurable: true });
window._mapCategoryColors = { 'Convenience': STORE_COLOR };
window._mapCategoryIcons  = { 'Convenience': '🏪' };

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

map = L.map('map').setView([9.52, 99.99], 12);
window._leafletMap = map;
let _flyingTo = false;
map.on('click', clearFocus);
map.on('dragstart', () => { if (!_flyingTo) clearFocus(); });
map.on('zoomstart', () => { if (!_flyingTo) clearFocus(); });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

function makeIcon() {
  return L.divIcon({
    className: '',
    html: `<div style="width:32px;height:32px;border-radius:6px;background:white;box-shadow:0 2px 6px rgba(0,0,0,0.3);border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;padding:2px;"><img src="/images/711-logo.svg" style="width:100%;height:100%;object-fit:contain;" alt="7-Eleven"></div>`,
    iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -20]
  });
}

function focusPOI(f) {
  const [lng, lat] = f.geometry.coordinates;
  _flyingTo = true;
  map.flyTo([lat, lng], 16, { duration: 0.7 });
  map.once('moveend', () => { _flyingTo = false; });
  if (markers[f._id]) markers[f._id].openPopup();
  if (activeCard !== null) document.getElementById('card-' + activeCard)?.classList.remove('active');
  activeCard = f._id;
  document.getElementById('card-' + f._id)?.classList.add('active');
  document.getElementById('card-' + f._id)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  Object.entries(markers).forEach(([id, m]) => {
    const el = m.getElement();
    if (el) el.style.opacity = (String(id) === String(f._id)) ? '1' : '0.2';
  });
  document.querySelectorAll('.poi-card').forEach(c =>
    c.classList.toggle('faded', c.id !== 'card-' + f._id));
}

function clearFocus() {
  if (activeCard === null) return;
  document.getElementById('card-' + activeCard)?.classList.remove('active');
  activeCard = null;
  Object.values(markers).forEach(m => { const el = m.getElement(); if (el) el.style.opacity = '1'; });
  document.querySelectorAll('.poi-card').forEach(c => c.classList.remove('faded'));
}

function renderSidebar() {
  const search = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('poi-list');
  list.innerHTML = '';
  const filtered = allPOIs.filter(f => {
    const p = f.properties;
    const matchArea = activeFilter === 'All' || p.area === activeFilter;
    const matchSearch = !search || p.name.toLowerCase().includes(search) || (p.area||'').toLowerCase().includes(search);
    return matchArea && matchSearch;
  });
  document.getElementById('visible-count').textContent = filtered.length;
  filtered.forEach(f => {
    const p = f.properties;
    const [lng, lat] = f.geometry.coordinates;
    const card = document.createElement('div');
    card.className = 'poi-card';
    card.id = 'card-' + f._id;
    card.innerHTML = `
      <span class="area-badge">📍 ${p.area || 'Koh Samui'}</span>
      <h3>${p.name}</h3>
      <div class="poi-meta">🕐 ${p.hours || '24h'}</div>
      <div class="poi-actions">
        <a href="geo:${lat},${lng}" title="Open in OsmAnd">🗺️ OsmAnd</a>
        <a href="https://www.google.com/maps/search/?api=1&query=${lat},${lng}" target="_blank">Google Maps ↗</a>
      </div>`;
    card.onclick = () => focusPOI(f);
    list.appendChild(card);
  });
}

function filterPOIs() { renderSidebar(); updateMarkers(); }

function updateMarkers() {
  const search = document.getElementById('search').value.toLowerCase();
  Object.values(markers).forEach(m => map.removeLayer(m));
  Object.keys(markers).forEach(k => delete markers[k]);
  allPOIs.forEach(f => {
    const p = f.properties;
    const matchArea = activeFilter === 'All' || p.area === activeFilter;
    const matchSearch = !search || p.name.toLowerCase().includes(search) || (p.area||'').toLowerCase().includes(search);
    if (!matchArea || !matchSearch) return;
    const [lng, lat] = f.geometry.coordinates;
    const m = L.marker([lat, lng], { icon: makeIcon() })
      .addTo(map)
      .bindPopup(`<b>${p.name}</b><br><small>📍 ${p.area}</small><br>🕐 ${p.hours || '24h'}`);
    m.on('click', () => focusPOI(f));
    markers[f._id] = m;
  });
}

function setupAreaFilters(pois) {
  const areas = ['All', ...Array.from(new Set(pois.map(f => f.properties.area || 'Other'))).sort()];
  const container = document.getElementById('filter-btns');
  container.innerHTML = '';
  areas.forEach(area => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (area === activeFilter ? ' active' : '');
    btn.dataset.area = area;
    const count = area === 'All' ? pois.length : pois.filter(f => f.properties.area === area).length;
    btn.innerHTML = area === 'All' ? `All <span class="count-badge">${count}</span>` : `${area} <span class="count-badge">${count}</span>`;
    btn.onclick = () => {
      activeFilter = area;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterPOIs();
    };
    container.appendChild(btn);
  });
}

fetch(GEOJSON_URL)
  .then(r => r.json())
  .then(data => {
    allPOIs = data.features.map((f, i) => ({ ...f, _id: i }));
    window.MAP_CONFIG.geojsonData = data;
    setupAreaFilters(allPOIs);
    renderSidebar();
    updateMarkers();
    if (Object.keys(markers).length > 0) {
      const group = L.featureGroup(Object.values(markers));
      map.fitBounds(group.getBounds().pad(0.08));
    }
  })
  .catch(() => {
    document.getElementById('poi-list').innerHTML = '<p style="color:#888;font-size:0.85rem;padding:1rem;">No locations loaded yet.</p>';
  });


(function () {
  if (!document.documentElement.classList.contains('embed-mode')) return;
  var overlay = document.querySelector('.map-overlay');
  var btn     = document.getElementById('overlay-toggle-btn');
  if (!overlay || !btn) return;
  function setOverlay(open) {
    var mapEl = document.getElementById('map');
    var firstCard = overlay.querySelector('.overlay-card:not(.scrollable)');
    overlay.style.display = open ? 'flex' : 'none';
    if (firstCard) firstCard.style.display = open ? 'block' : '';
    btn.textContent = open ? '✕' : '☰';
    btn.title       = open ? 'Hide list' : 'Show list';
    if (mapEl) {
      if (open) {
        requestAnimationFrame(function () {
          if (window.innerWidth > 768) {
            mapEl.style.left   = (overlay.offsetWidth / 2) + 'px';
            mapEl.style.bottom = '';
          } else {
            mapEl.style.bottom = (overlay.offsetHeight / 2) + 'px';
            mapEl.style.left   = '';
          }
          if (window.map) window.map.invalidateSize();
        });
      } else {
        mapEl.style.left   = '';
        mapEl.style.bottom = '';
        if (window.map) window.map.invalidateSize();
      }
    }
  }
  btn.addEventListener('click', function () {
    setOverlay(overlay.style.display === 'none' || overlay.style.display === '');
  });
  var showOnLoad = new URLSearchParams(location.search).get('overlay') === '1';
  setOverlay(showOnLoad);
})();
</script>

  }
  @keyframes btn-blink { 50% { opacity: 0.45; } }
</style>

<script>
(function () {

  let _locMarker  = null;   
  let _locCircle  = null;   
  let _locWatchId = null;   
  let _locLatLng  = null;   
  let _routeLayer = null;   
  let _pendingId  = null;   
  let _activeId   = null;   

   
  window.toggleLocation = function () {
    const map = window._leafletMap;
    const btn = document.getElementById('locate-btn');
    if (!map || !btn) return;

    if (_locWatchId !== null) {
      
      navigator.geolocation.clearWatch(_locWatchId);
      _locWatchId = null;
      _locLatLng  = null;
      if (_locMarker) { map.removeLayer(_locMarker); _locMarker = null; }
      if (_locCircle) { map.removeLayer(_locCircle); _locCircle = null; }
      window.clearRoute();
      btn.textContent = '📍 Position';
      btn.classList.remove('loc-searching', 'loc-active');
      return;
    }

    if (!navigator.geolocation) {
      alert('La géolocalisation n\'est pas supportée par ce navigateur.');
      return;
    }

    btn.textContent = '⏳…';
    btn.classList.add('loc-searching');

    _locWatchId = navigator.geolocation.watchPosition(
      pos => {
        const { latitude: lat, longitude: lng, accuracy } = pos.coords;
        _locLatLng = [lat, lng];

        if (!_locMarker) {
          
          const icon = L.divIcon({
            className: '',
            html: '<div class="loc-dot"></div>',
            iconSize: [18, 18],
            iconAnchor: [9, 9]
          });
          _locMarker = L.marker([lat, lng], { icon, zIndexOffset: 1000, interactive: false })
            .addTo(map);
          _locCircle = L.circle([lat, lng], {
            radius: accuracy,
            color: '#3b82f6', fillColor: '#3b82f6',
            fillOpacity: 0.07, weight: 1, interactive: false
          }).addTo(map);
          map.flyTo([lat, lng], Math.max(map.getZoom(), 15), { duration: 0.8 });
        } else {
          _locMarker.setLatLng([lat, lng]);
          _locCircle.setLatLng([lat, lng]).setRadius(accuracy);
        }

        btn.textContent = '🔵 Position';
        btn.classList.remove('loc-searching');
        btn.classList.add('loc-active');

        
        if (_pendingId !== null) {
          const id = _pendingId;
          _pendingId = null;
          window.showRoute(id);
        } else if (_activeId !== null) {
          
          const poi = (window.allPOIs || []).find(f => f._id === _activeId);
          if (poi) _drawRoute(_activeId, poi.geometry.coordinates[1], poi.geometry.coordinates[0]);
        }
      },
      err => {
        btn.textContent = '📍 Position';
        btn.classList.remove('loc-searching');
        _locWatchId = null;
        if (err.code === 1) {
          alert('Géolocalisation refusée. Autorisez-la dans les paramètres du navigateur.');
        }
      },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
    );
  };

   
  window.showRoute = function (poiId) {
    const poi = (window.allPOIs || []).find(f => f._id === poiId);
    if (!poi) return;

    if (!_locLatLng) {
      
      _pendingId = poiId;
      if (_locWatchId === null) window.toggleLocation();
      return;
    }

    const [destLng, destLat] = poi.geometry.coordinates;
    _drawRoute(poiId, destLat, destLng);
  };

   
  window.clearRoute = function () {
    if (_routeLayer) {
      window._leafletMap?.removeLayer(_routeLayer);
      _routeLayer = null;
    }
    _activeId  = null;
    _pendingId = null;
    document.querySelectorAll('.route-info').forEach(el => el.remove());
    document.querySelectorAll('[data-route-poi]').forEach(a => {
      a.textContent = '🧭 Route';
      a.style.opacity = '';
    });
  };

   
  async function _drawRoute(poiId, destLat, destLng) {
    if (!_locLatLng) return;
    const map = window._leafletMap;
    const [origLat, origLng] = _locLatLng;

    const routeBtn = document.querySelector(`[data-route-poi="${poiId}"]`);
    if (routeBtn) { routeBtn.textContent = '⏳'; routeBtn.style.opacity = '0.6'; }

    
    if (_routeLayer) { map.removeLayer(_routeLayer); _routeLayer = null; }
    document.querySelectorAll('.route-info').forEach(el => el.remove());
    _activeId = poiId;

    try {
      const url = `https://router.project-osrm.org/route/v1/foot/${origLng},${origLat};${destLng},${destLat}?overview=full&geometries=geojson`;
      const res  = await fetch(url);
      const data = await res.json();
      if (data.code !== 'Ok' || !data.routes?.length) throw new Error('no route');

      const route   = data.routes[0];
      const distM   = Math.round(route.distance);
      const distStr = distM < 1000
        ? distM + '\u202fm'
        : (distM / 1000).toFixed(1) + '\u202fkm';
      const mins = Math.round(route.duration / 60);

      const coords = route.geometry.coordinates.map(([ln, la]) => [la, ln]);
      _routeLayer  = L.polyline(coords, {
        color: '#1a3a5c', weight: 4, opacity: 0.85,
        dashArray: '8 6', lineCap: 'round', lineJoin: 'round'
      }).addTo(map);

      map.fitBounds(
        _routeLayer.getBounds().extend(_locLatLng),
        { padding: [48, 48], maxZoom: 17 }
      );

      _injectBadge(poiId, `🚶 ${distStr} · ${mins} min à pied`);

    } catch {
      
      const R  = 6371000;
      const φ1 = origLat * Math.PI / 180, φ2 = destLat * Math.PI / 180;
      const dφ = (destLat - origLat) * Math.PI / 180;
      const dλ = (destLng - origLng) * Math.PI / 180;
      const a  = Math.sin(dφ/2)**2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(dλ/2)**2;
      const d  = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      const distStr = d < 1000
        ? Math.round(d) + '\u202fm'
        : (d / 1000).toFixed(1) + '\u202fkm';

      _routeLayer = L.polyline([_locLatLng, [destLat, destLng]], {
        color: '#6b7280', weight: 3, opacity: 0.6, dashArray: '5 8'
      }).addTo(map);

      _injectBadge(poiId, `📏 ${distStr} à vol d'oiseau`);
    }

    if (routeBtn) { routeBtn.textContent = '🧭 Route'; routeBtn.style.opacity = ''; }
  }

  function _injectBadge(poiId, text) {
    const card = document.getElementById('card-' + poiId);
    if (!card) return;
    const badge = document.createElement('div');
    badge.className = 'route-info';
    badge.textContent = text;
    const actions = card.querySelector('.poi-actions');
    actions ? actions.before(badge) : card.appendChild(badge);
  }

})();
</script>
